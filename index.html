<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LevelUp</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0f0f1a" />
</head>

<body>

    <!-- STATUS SCREEN -->
    <div class="screen active" id="screen-status">
        <div class="status-header">
            <div class="player-title">[ ORDINARY PERSON ]</div>
            <h1 class="player-name" id="player-name">PLAYER</h1>
            <div class="player-level">LEVEL <span id="player-level">1</span></div>
        </div>

        <div class="stat-block">
            <div class="stat-row" data-stat="strength">
                <span class="stat-label">STRENGTH</span>
                <div class="stat-bar-wrap">
                    <div class="stat-bar" id="bar-strength"></div>
                </div>
                <span class="stat-value" id="val-strength">10</span>
            </div>
            <div class="stat-row" data-stat="intelligence">
                <span class="stat-label">INTELLIGENCE</span>
                <div class="stat-bar-wrap">
                    <div class="stat-bar" id="bar-intelligence"></div>
                </div>
                <span class="stat-value" id="val-intelligence">10</span>
            </div>
            <div class="stat-row" data-stat="agility">
                <span class="stat-label">AGILITY</span>
                <div class="stat-bar-wrap">
                    <div class="stat-bar" id="bar-agility"></div>
                </div>
                <span class="stat-value" id="val-agility">10</span>
            </div>
            <div class="stat-row" data-stat="endurance">
                <span class="stat-label">ENDURANCE</span>
                <div class="stat-bar-wrap">
                    <div class="stat-bar" id="bar-endurance"></div>
                </div>
                <span class="stat-value" id="val-endurance">10</span>
            </div>
            <div class="stat-row" data-stat="charisma">
                <span class="stat-label">CHARISMA</span>
                <div class="stat-bar-wrap">
                    <div class="stat-bar" id="bar-charisma"></div>
                </div>
                <span class="stat-value" id="val-charisma">10</span>
            </div>

            <div class="luck-divider"></div>

            <div class="stat-row luck-row" data-stat="luck">
                <span class="stat-label">LUCK</span>
                <div class="stat-bar-wrap">
                    <div class="stat-bar luck-bar" id="bar-luck"></div>
                </div>
                <span class="stat-value" id="val-luck">10</span>
            </div>
        </div>

        <button class="nav-btn" onclick="showScreen('screen-quests')">VIEW DAILY QUESTS</button>
    </div>

    <!-- QUESTS SCREEN -->
    <div class="screen" id="screen-quests">
        <div class="quest-header">
            <h2>DAILY QUESTS</h2>
            <div class="quest-date" id="quest-date"></div>
        </div>
        <div class="quest-list" id="quest-list">
            <!-- Quests injected by JS -->
        </div>
        <button class="nav-btn secondary" onclick="showScreen('screen-status')">BACK TO STATUS</button>
    </div>

    <!-- ONBOARDING SCREEN -->
    <div class="screen" id="screen-onboarding">
        <div class="onboarding-box">
            <div class="player-title">[ SYSTEM ]</div>
            <h2>INITIALISING PLAYER DATA</h2>
            <p>Enter your name to begin your journey.</p>
            <input type="text" id="name-input" placeholder="Enter your name..." maxlength="20" />
            <button class="nav-btn" id="start-btn">AWAKEN</button>
        </div>
    </div>

    <script src="js/quests.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
